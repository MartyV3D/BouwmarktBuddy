<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>BouwmarktBuddy — Firebase Import Cluster 1087</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 8px; }
    button { background: #1d9e75; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 16px; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #log { margin-top: 16px; font-size: 13px; background: #f0f0f0; border-radius: 8px; padding: 12px; max-height: 300px; overflow-y: auto; }
    .ok { color: #1d9e75; }
    .err { color: #e53e3e; }
    #progress { margin-top: 12px; font-size: 14px; font-weight: 500; }
    progress { width: 100%; height: 12px; border-radius: 6px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔥 BouwmarktBuddy — Import Cluster 1087</h1>
  <p>Dit script importeert alle producten van <strong>Cluster 1087</strong> in Firebase.</p>
  <div id="progress"></div>
  <progress id="prog-bar" value="0" max="1" style="display:none;"></progress>
  <button id="start-btn">▶ Start import</button>
  <div id="log"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyByXEZVX6bDpEqvPrUflzMzQ6rJ8ZF1wgY",
    authDomain: "bouwmarktbuddy-82e1c.firebaseapp.com",
    projectId: "bouwmarktbuddy-82e1c",
    storageBucket: "bouwmarktbuddy-82e1c.firebasestorage.app",
    messagingSenderId: "489636021675",
    appId: "1:489636021675:web:1b42ed107a407d033abeee"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  var products = [
    // ── CLUSTER 1087 ──
    { naam: "Basic Stuc", ean: "5400107739417", px: "5673506", volgnummer: "101", cluster: "1087", pad: "42, 43" },
  ];

  document.getElementById('start-btn').addEventListener('click', async function() {
    var btn = document.getElementById('start-btn');
    var log = document.getElementById('log');
    var prog = document.getElementById('prog-bar');
    var progress = document.getElementById('progress');
    btn.disabled = true;
    prog.style.display = 'block';
    prog.max = products.length;
    log.innerHTML = '';
    var ok = 0, err = 0;

    for (var i = 0; i < products.length; i++) {
      var p = products[i];
      try {
        await db.collection('producten').doc(p.ean).set(p);
        ok++;
        prog.value = i + 1;
        progress.textContent = (i + 1) + ' / ' + products.length + ' geïmporteerd...';
        log.innerHTML += '<div class="ok">✓ ' + p.naam + ' (' + p.ean + ')</div>';
        log.scrollTop = log.scrollHeight;
      } catch(e) {
        err++;
        log.innerHTML += '<div class="err">✗ Fout bij ' + p.naam + ': ' + e.message + '</div>';
      }
    }

    progress.textContent = '✅ Klaar! ' + ok + ' producten geïmporteerd, ' + err + ' fouten.';
    btn.textContent = '✅ Import voltooid!';
  });
</script>
</body>
</html>
